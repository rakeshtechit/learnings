version: '3.8'
services:
  # N8N Workflow Automation Tool 
  ace:
    image: ibmcom/ace:latest
    container_name: aceserver
    ports:
      - "7600:7600"
      - "7800:7800"
      - "7843:7843"
    environment:
      - LICENSE=accept
      - ACE_SERVER_NAME=ACESERVER
    networks:
      - dev-network
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=0.0.0.0
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
      - NODE_ENV=production
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./n8n-data:/home/node/.n8n
    depends_on:
      - ollama
    networks:
      - dev-network
  # Ollama AI Model Server
  ollama:
    build: 
      context: .
      dockerfile: Dockerfile.ollama
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./ollama-data:/root/.ollama
    environment:
      - OLLAMA_ALLOW_INSECURE=true
    networks:
      - dev-network
  # Solace PubSub+ Standard Edition
  solace:
    image: solace/solace-pubsub-standard
    container_name: solace
    ports:
      - "8080:8080"
      - "55555:55555"
      - "8008:8008"
      - "1883:1883"
      - "8000:8000"
      - "5672:5672"
      - "9000:9000"
      - "2222:2222"
    shm_size: ${SOLACE_SHM_SIZE:-1g}
    environment:
      - username_admin_globalaccesslevel=${SOLACE_USERNAME_ADMIN_GLOBALACCESSLEVEL}
      - username_admin_password=${SOLACE_PASSWORD}
    networks:
      - dev-network
  postgres:
    image: postgres:latest
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-default'}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql

networks:
  dev-network:
    driver: bridge

# volumes are in the project directory for repeatability